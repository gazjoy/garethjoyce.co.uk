{% extends 'layouts/shell.html' %}

{% block title %}
Demo 1 - CSS Grid - Talk – Gaz Joyce
{% endblock %}

{% block content %}

<div class="grid">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
</div>

<style style="
  display: inline-block;
  background: #222;
  padding: 1em;
  white-space: pre;
  font-family: monospace;
  border-radius: 5px;
  margin: 1em 0;
  ">.grid {
  display: grid;
  gap: 1em;
  grid-auto-rows: minmax(100px, 1fr);
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, minmax(100px, 1fr));
}

.item {
  background-color: #f5e2eb;
  color: rgb(179, 51, 119);
  display: flex;
  align-items: center;
  justify-content: center;
}

.item:nth-child(1) {
  grid-column: 1 / 4;
}

.item:nth-child(3) {
  grid-column: 1 / 3;
  grid-row: 2 / 4;
}

.item:nth-child(4),
.item:nth-child(5) {
  grid-row: 2 / 4;
}
</style>

<p><a href="./">&larr; Back</a></p>

{% endblock %}
