{% extends 'layouts/demo.html' %}

{% block title %}
Demo 4 - CSS Grid - Demos – Gaz Joyce
{% endblock %}

{% block content %}

<div class="grid">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
</div>

<hr>
<a href="./" class="gj-back-link">&larr; Back</a>
<h1>Spanning columns and rows</h1>

<style style="
  display: inline-block;
  background: #222;
  padding: 1em;
  white-space: pre;
  font-family: monospace;
  border-radius: 5px;
  margin: 1em 0;
  ">.grid {
  display: grid;
  gap: 1em;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, minmax(100px, 1fr));
}

.item:nth-child(1) {
  grid-column: 1 / 4;
}

.item:nth-child(3) {
  grid-column: 1 / 3;
  grid-row: 2 / 4;
}

.item:nth-child(6) {
  grid-column: 4 / 5;
  grid-row: 2 / 4;
}
</style>

{% endblock %}
