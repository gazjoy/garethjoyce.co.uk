<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block head %}
    <link rel="stylesheet" href="/stylesheets/slides.css">
    <link href="https://fonts.googleapis.com/css?family=Lato:400,400i,900,900i" rel="stylesheet">
    {% endblock %}
  </head>
  <body class="{{ bodyClasses }}">
    <div class="slide-nav">
      <button class="slide-nav__btn" data-dir="forwards"><span>Next</span></button>
      <button class="slide-nav__btn" data-dir="backwards"><span>Prev</span></button>
    </div>
    <div class="slide-container">
      {% block content %}{% endblock %}
    </div>
  {% block javascript %}
    <script src="/javascripts/app.js"></script>
    {% endblock %}
  </body>
</html>
